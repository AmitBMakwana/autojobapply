<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8">
  <style>
    body {
      width: 340px;
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background-color: #0a0a0f;
      color: #f8fafc;
      font-size: 13px;
    }

    .container {
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      padding-bottom: 12px;
    }

    .logo-container {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .logo-text {
      font-size: 15px;
      font-weight: 800;
      background: linear-gradient(to right, #10b981, #06b6d4);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .btn-edit-profile {
      font-size: 10px;
      font-weight: 700;
      color: #94a3b8;
      text-decoration: none;
      padding: 4px 10px;
      border-radius: 8px;
      background-color: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.08);
      transition: all 0.2s;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .btn-edit-profile:hover {
      color: #fff;
      background-color: rgba(255, 255, 255, 0.1);
    }

    .job-card {
      background-color: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 12px;
      padding: 14px;
      position: relative;
    }

    .job-title {
      font-size: 14px;
      font-weight: 800;
      color: #ffffff;
      margin: 0 0 6px 0;
      line-height: 1.3;
    }

    .job-company {
      font-size: 12px;
      color: #10b981;
      font-weight: 700;
      margin: 0 0 4px 0;
    }

    .job-meta {
      font-size: 11px;
      color: #64748b;
      margin: 0;
    }

    .live-progress {
      padding: 24px 12px;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }

    .spinner {
      width: 28px;
      height: 28px;
      border: 3px solid rgba(16, 185, 129, 0.1);
      border-top-color: #10b981;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    .progress-text {
      font-size: 12px;
      color: #94a3b8;
      font-weight: 600;
    }

    .section-title {
      font-size: 10px;
      font-weight: 700;
      color: #64748b;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 8px;
    }

    .bullets {
      margin: 0;
      padding-left: 16px;
      color: #cbd5e1;
      font-size: 12px;
      line-height: 1.5;
    }

    .bullets li {
      margin-bottom: 6px;
    }

    .skills-container {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .tag {
      font-size: 10px;
      padding: 3px 8px;
      border-radius: 6px;
      font-weight: 600;
    }

    .tag-match {
      background-color: rgba(16, 185, 129, 0.08);
      color: #34d399;
      border: 1px solid rgba(16, 185, 129, 0.15);
    }

    .tag-missing {
      background-color: rgba(249, 115, 22, 0.08);
      color: #f97316;
      border: 1px solid rgba(249, 115, 22, 0.15);
    }

    .score-badge {
      position: absolute;
      top: 14px;
      right: 14px;
      width: 42px;
      height: 42px;
      border-radius: 50%;
      background-color: rgba(255, 255, 255, 0.05);
      border: 2px solid #10b981;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .score-val {
      font-size: 13px;
      font-weight: 900;
      color: #10b981;
    }

    .score-pct {
      font-size: 7px;
      color: #64748b;
      font-weight: 700;
    }

    .btn-row {
      display: flex;
      gap: 10px;
    }

    .btn {
      flex: 1;
      padding: 11px;
      border-radius: 8px;
      border: none;
      font-weight: 700;
      font-size: 12px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      transition: all 0.2s;
    }

    .btn:hover {
      transform: translateY(-1px);
    }

    .btn-primary {
      background-color: #10b981;
      color: #ffffff;
    }

    .btn-primary:hover {
      background-color: #059669;
    }

    .btn-autofill {
      background-color: #06b6d4;
      color: #ffffff;
    }

    .btn-autofill:hover {
      background-color: #0891b2;
    }

    .btn-secondary {
      background-color: rgba(255, 255, 255, 0.05);
      color: #cbd5e1;
      border: 1px solid rgba(255, 255, 255, 0.08);
    }

    .btn-secondary:hover {
      background-color: rgba(255, 255, 255, 0.1);
      color: #fff;
    }

    .status-alert {
      padding: 10px;
      border-radius: 8px;
      font-size: 11px;
      font-weight: 600;
      display: none;
    }

    .status-alert-success {
      background-color: rgba(16, 185, 129, 0.08);
      color: #10b981;
      border: 1px solid rgba(16, 185, 129, 0.2);
    }

    .status-alert-error {
      background-color: rgba(239, 68, 68, 0.08);
      color: #ef4444;
      border: 1px solid rgba(239, 68, 68, 0.2);
    }

    .footer {
      font-size: 9px;
      color: #475569;
      text-align: center;
      border-top: 1px solid rgba(255, 255, 255, 0.08);
      padding-top: 10px;
    }
  </style>
</head>

<body>
  <div class="container">

    <!-- Top Header -->
    <div class="header">
      <div class="logo-container">
        <div style="width:10px; height:10px; border-radius:50%; background-color:#10b981;"></div>
        <span class="logo-text">JobForge AI AI</span>
      </div>
      <a href="http://localhost:3000/profile" target="_blank" class="btn-edit-profile">Edit Resume</a>
    </div>

    <!-- Live Progress Loader -->
    <div id="loader-block" class="live-progress">
      <div class="spinner"></div>
      <div id="loader-text" class="progress-text">Analyzing page...</div>
    </div>

    <!-- Scraped Job Info Block (Hidden initially) -->
    <div id="job-details-block" style="display: none;" class="job-card">
      <div id="score-badge" class="score-badge">
        <span id="score-val" class="score-val">--</span>
        <span class="score-pct">FIT</span>
      </div>
      <h3 id="job-title" class="job-title">Job Title</h3>
      <p id="job-company" class="job-company">Company</p>
      <p id="job-meta" class="job-meta">Location</p>
    </div>

    <!-- Analysis Highlights Block (Hidden initially) -->
    <div id="highlights-block" style="display: none;" class="container-section">
      <div class="section-title">Key Matches & Rationale</div>
      <ul id="highlights-list" class="bullets"></ul>
    </div>

    <!-- Missing Keywords Block (Hidden initially) -->
    <div id="skills-block" style="display: none;" class="container-section">
      <div class="section-title">Skills & Keywords</div>
      <div id="skills-list" class="skills-container"></div>
    </div>

    <!-- Dynamic Alert Message -->
    <div id="status-alert" class="status-alert"></div>

    <!-- Action Buttons Block (Hidden initially) -->
    <div id="actions-block" style="display: none; flex-direction: column; gap: 8px;">

      <!-- Side-by-Side Download Buttons -->
      <div class="btn-row">
        <button id="btn-open-resume" type="button" class="btn btn-primary" style="flex: 1;">
          📄 Resume
        </button>
        <button id="btn-open-cl" type="button" class="btn btn-primary" style="flex: 1;">
          ✉️ Cover Letter
        </button>
      </div>

      <!-- Main Autofill Button -->
      <button id="btn-autofill" class="btn btn-autofill">
        ⚡ Autofill Application Form
      </button>

      <!-- Re-Scout & Enter Manually Buttons -->
      <div class="btn-row">
        <button id="btn-re-analyze" class="btn btn-secondary" style="flex: 1;">
          🔄 Re-Analyze
        </button>
        <button id="btn-enter-manually" class="btn btn-secondary" style="flex: 1;">
          ✍️ Manual Input
        </button>
      </div>

    </div>

    <!-- Manual Input Form (Shown when scraping fails or when "Manual Input" is clicked) -->
    <div id="manual-form-block"
      style="display: none; flex-direction: column; gap: 10px; background-color: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 12px; padding: 14px; box-sizing: border-box;">
      <h3 style="margin: 0 0 6px 0; font-size: 13px; font-weight: 800; color: #fff;">Enter Job Details Manually</h3>
      <input id="manual-title" type="text" placeholder="Job Title"
        style="background: rgba(0,0,0,0.2); border: 1px solid rgba(255,255,255,0.08); border-radius: 6px; padding: 8px; color: #fff; font-size: 12px; outline: none;"
        required />
      <input id="manual-company" type="text" placeholder="Company Name"
        style="background: rgba(0,0,0,0.2); border: 1px solid rgba(255,255,255,0.08); border-radius: 6px; padding: 8px; color: #fff; font-size: 12px; outline: none;"
        required />
      <input id="manual-location" type="text" placeholder="Location (e.g. Remote)"
        style="background: rgba(0,0,0,0.2); border: 1px solid rgba(255,255,255,0.08); border-radius: 6px; padding: 8px; color: #fff; font-size: 12px; outline: none;" />
      <textarea id="manual-description" placeholder="Paste Job Description here..."
        style="background: rgba(0,0,0,0.2); border: 1px solid rgba(255,255,255,0.08); border-radius: 6px; padding: 8px; color: #fff; font-size: 12px; height: 110px; resize: none; font-family: sans-serif; outline: none;"
        required></textarea>

      <div style="display: flex; gap: 8px; margin-top: 4px;">
        <button id="btn-cancel-manual" class="btn btn-secondary" style="padding: 8px; flex: 1;">Cancel</button>
        <button id="btn-submit-manual" class="btn btn-primary"
          style="padding: 8px; flex: 1.5; background-color: #10b981;">🚀 Analyze</button>
      </div>
    </div>

    <div class="footer">
      Safety Gated: autofill fields only, no auto-submits.
    </div>

  </div>

  <!-- Resume Preview Overlay -->
  <div id="resume-overlay"
    style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: #0a0a0f; z-index: 100; flex-direction: column; box-sizing: border-box; padding: 16px;">
    <div
      style="display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(255, 255, 255, 0.08); padding-bottom: 10px; margin-bottom: 12px;">
      <span style="font-size: 14px; font-weight: 800; color: #fff;">Tailored Resume</span>
      <button id="btn-close-resume"
        style="background: none; border: none; color: #94a3b8; font-size: 16px; font-weight: bold; cursor: pointer;">✕</button>
    </div>

    <div id="resume-text-container"
      style="flex: 1; overflow-y: auto; background-color: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 8px; padding: 12px; font-family: monospace; font-size: 11px; white-space: pre-wrap; line-height: 1.4; color: #cbd5e1; margin-bottom: 14px;">
    </div>

    <div style="display: flex; gap: 8px;">
      <button id="btn-copy-resume" class="btn btn-secondary" style="flex: 1;">📋 Copy</button>
      <a id="btn-pdf-resume" href="#" target="_blank" style="text-decoration: none; flex: 1;"><button
          class="btn btn-primary" style="width: 100%; height: 100%;">📄 PDF</button></a>
      <a id="btn-docx-resume" href="#" target="_blank" style="text-decoration: none; flex: 1;"><button
          class="btn btn-primary" style="width: 100%; height: 100%;">✉️ DOCX</button></a>
    </div>
  </div>

  <!-- Cover Letter Preview Overlay -->
  <div id="cl-overlay"
    style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: #0a0a0f; z-index: 100; flex-direction: column; box-sizing: border-box; padding: 16px;">
    <div
      style="display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(255, 255, 255, 0.08); padding-bottom: 10px; margin-bottom: 12px;">
      <span style="font-size: 14px; font-weight: 800; color: #fff;">Tailored Cover Letter</span>
      <button id="btn-close-cl"
        style="background: none; border: none; color: #94a3b8; font-size: 16px; font-weight: bold; cursor: pointer;">✕</button>
    </div>

    <div id="cl-text-container"
      style="flex: 1; overflow-y: auto; background-color: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 8px; padding: 12px; font-family: monospace; font-size: 11px; white-space: pre-wrap; line-height: 1.4; color: #cbd5e1; margin-bottom: 14px;">
    </div>

    <div style="display: flex; gap: 8px;">
      <button id="btn-copy-cl" class="btn btn-secondary" style="flex: 1;">📋 Copy</button>
      <a id="btn-pdf-cl" href="#" target="_blank" style="text-decoration: none; flex: 1;"><button
          class="btn btn-primary" style="width: 100%; height: 100%;">📄 PDF</button></a>
      <a id="btn-docx-cl" href="#" target="_blank" style="text-decoration: none; flex: 1;"><button
          class="btn btn-primary" style="width: 100%; height: 100%;">✉️ DOCX</button></a>
    </div>
  </div>

  <script src="popup.js"></script>
</body>

</html>
